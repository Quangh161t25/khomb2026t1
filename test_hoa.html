<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa Đơn Bán Hàng - Khang Thành Flower</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Social Sharing Meta Tags -->
    <meta name="description" content="Hóa đơn hoa thanh toán tại Khang Thành Flower - Đà Lạt.">
    <meta property="og:title" id="meta-og-title" content="Hóa Đơn Hoa - Khang Thành Flower">
    <meta property="og:description" content="Lời hoa gửi gắm tận tâm. Chân thành cảm ơn quý khách!">
    <meta property="og:image" content="https://i.ibb.co/X1vVPZn/65-A0-B8-B5-1-EA7-43-D4-87-EC-DB2-C237-B4-EC6.png">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#b38b00">
    <style>
        /* Base Styles */
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fffcf5;
            /* Pastel gold background */
            color: #2c3e50;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        @media print {
            .no-print {
                display: none;
            }

            body {
                background-color: white;
            }

            .invoice-container {
                box-shadow: none;
                border: none;
                margin: 0;
                padding: 10px;
                max-width: 100%;
            }
        }

        /* Layout */
        .no-print-header {
            display: flex;
            justify-content: center;
            padding: 1rem;
            background-color: #1f2937;
        }

        .invoice-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        @media (min-width: 640px) {
            .invoice-container {
                margin: 20px auto;
                padding: 40px;
            }
        }

        /* Buttons */
        #copy-btn {
            background-color: #16a34a;
            color: white;
            padding: 0.5rem 2rem;
            border-radius: 9999px;
            font-weight: 700;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #copy-btn:hover {
            background-color: #15803d;
            transform: scale(1.05);
        }

        .bg-gray-600 {
            background-color: #4b5563 !important;
        }

        /* Header Section */
        .invoice-header {
            display: flex;
            flex-direction: column;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.5rem;
            gap: 0.75rem;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo-box,
        .qr-box {
            background-color: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .qr-box {
            padding: 0.25rem;
        }

        .logo-img {
            width: 6rem;
            height: auto;
        }

        .qr-img {
            width: 7rem;
            height: auto;
        }

        @media (min-width: 640px) {
            .logo-img {
                width: 7rem;
            }

            .qr-img {
                width: 8rem;
            }
        }

        .shop-info {
            text-align: center;
        }

        .shop-name {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.875rem;
            font-weight: 700;
            color: #b38b00;
            line-height: 1.25;
            margin: 0;
        }

        @media (min-width: 640px) {
            .shop-name {
                font-size: 2.25rem;
            }
        }



        .address {
            font-size: 0.875rem;
            margin: 0.5rem 0 0;
        }

        .phone {
            font-size: 0.875rem;
            font-weight: 600;
            color: #b38b00;
            margin: 0;
        }

        /* Title */
        .title-section {
            text-align: center;
            margin-bottom: 0.25rem;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            color: #1e3a8a;
            font-size: 24px;
            letter-spacing: 1px;
            border-bottom: 1px solid #1e3a8a;
            display: inline-block;
            padding-bottom: 8px;
            text-transform: uppercase;
            margin: 0;
        }

        @media (min-width: 640px) {
            .header-title {
                font-size: 26px;
                letter-spacing: 2px;
            }
        }

        /* Info Section */
        .info-section {
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            border-left: 2px solid #b38b00;
            padding: 0.5rem 0 0.5rem 1rem;
            background-color: #fffaf0;
            border-radius: 0 0.5rem 0.5rem 0;
        }

        @media (min-width: 640px) {
            .info-section {
                font-size: 1rem;
            }
        }

        .info-section p {
            margin: 0;
            line-height: 1.5;
        }

        .text-gray-600 {
            color: #4b5563;
        }

        /* Table Section */
        .table-container {
            overflow-x: auto;
            margin-bottom: 1rem;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 11px;
        }

        @media (min-width: 640px) {
            table {
                font-size: 15px;
            }
        }

        thead {
            background-color: rgba(255, 252, 245, 0.5);
        }

        th,
        td {
            border-bottom: 0.5px solid #e2e8f0;
            padding: 8px 2px;
            text-align: left;
            line-height: 1.2;
        }

        th {
            border-top: 1px solid #1e3a8a;
            border-bottom: 1px solid #1e3a8a;
            color: #1e3a8a;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: center;
        }

        @media (min-width: 640px) {

            th,
            td {
                padding: 12px 8px;
                line-height: 1.5;
            }
        }

        .text-center {
            text-align: center;
        }

        .text-right {
            text-align: right;
        }

        .font-bold {
            font-weight: 700;
        }

        /* Widths */
        .col-stt {
            width: 25px;
        }

        .col-ten {
            width: auto;
        }

        .col-sl {
            width: 30px;
        }

        .col-gia {
            width: 75px;
        }

        .col-tien {
            width: 90px;
        }

        @media (min-width: 640px) {
            .col-stt {
                width: 35px;
            }

            .col-sl {
                width: 40px;
            }

            .col-gia {
                width: 90px;
            }

            .col-tien {
                width: 110px;
            }
        }

        /* Summary Section */
        .summary-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .glass-panel {
            width: 100%;
            background: rgba(179, 139, 0, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        @media (min-width: 640px) {
            .glass-panel {
                width: 350px;
            }
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(179, 139, 0, 0.1);
            padding-bottom: 0.5rem;
            margin-bottom: 0.375rem;
        }

        @media (min-width: 640px) {
            .summary-row {
                margin-bottom: 0.625rem;
            }
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            color: #1e3a8a;
            margin-top: 0.5rem;
        }

        .summary-final {
            display: flex;
            justify-content: space-between;
            font-size: 1.125rem;
            font-weight: 700;
            color: #1e3a8a;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(30, 58, 138, 0.2);
            text-transform: uppercase;
        }

        /* Footer */
        .footer-msg {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            font-style: italic;
            color: #6b7280;
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>

<body>
    <div class="no-print no-print-header">
        <button id="copy-btn" onclick="copyInvoiceLink()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
            </svg>
            <span>Sao chép Link Hóa đơn</span>
        </button>
    </div>

    <div class="invoice-container">
        <!-- Header Section -->
        <div class="invoice-header">
            <div class="header-top">
                <div class="logo-box">
                    <img src="https://i.ibb.co/X1vVPZn/65-A0-B8-B5-1-EA7-43-D4-87-EC-DB2-C237-B4-EC6.png"
                        alt="Khang Thành Flower Logo" class="logo-img">
                </div>
                <div class="qr-box">
                    <img src="https://img.vietqr.io/image/970415-113366668888-qr_only.png" alt="QR Thanh Toán"
                        class="qr-img">
                </div>
            </div>
            <div class="shop-info">
                <h1 class="shop-name">Khang Thành Flower</h1>

                <p class="address">338 Xô Viết Nghệ Tĩnh - P. Lang Biang - Đà Lạt</p>
                <p class="phone">SĐT: 0902.422.102</p>
                <p class="phone">STK: 0090123457979 - MB - NGUYEN THI THUY LOAN</p>
            </div>
        </div>

        <div class="title-section">
            <h2 class="header-title">Hóa Đơn Bán Hàng</h2>
        </div>

        <!-- Info Section -->
        <div class="info-section" id="info-section">
            <p><span class="text-gray-600">Ngày:</span> <span class="font-bold" id="ngay-text"></span></p>
            <p><span class="text-gray-600">Khách hàng:</span> <span class="font-bold" id="khach-hang-text"></span></p>
        </div>

        <!-- Table Section -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-stt">STT</th>
                        <th class="col-ten">Tên hoa</th>
                        <th class="col-sl">SL</th>
                        <th class="col-gia">Đơn giá</th>
                        <th class="col-tien">Thành tiền</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                    <!-- Sản phẩm sẽ được thêm động ở đây -->
                </tbody>
            </table>
        </div>

        <!-- Footer Summary -->
        <div class="summary-container">
            <div class="glass-panel" id="summary-section">
                <!-- Nội dung tổng cộng sẽ được JavaScript điền vào -->
            </div>
        </div>

        <div class="footer-msg">
            <p>Khang Thành Flower chân thành cảm ơn quý khách!</p>
        </div>
    </div>

    <script>
        // Hàm sao chép link hóa đơn
        function copyInvoiceLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('copy-btn');
                const originalContent = btn.innerHTML;

                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <span>Đã sao chép!</span>
                `;
                btn.style.backgroundColor = '#4b5563';

                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.style.backgroundColor = '#16a34a';
                }, 2000);
            }).catch(err => {
                console.error('Lỗi khi sao chép:', err);
                alert('Không thể sao chép link. Vui lòng copy thủ công trên thanh địa chỉ.');
            });
        }

        // Hàm giải mã và làm sạch dữ liệu
        function cleanData(str) {
            try {
                if (!str) return "";
                return decodeURIComponent(str.replace(/\+/g, ' ')).trim();
            } catch (e) {
                return str ? str.trim() : "";
            }
        }

        // Hàm format số tiền (chỉ lấy số và dấu chấm)
        function formatNumber(amount) {
            return amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Hàm format số tiền có chữ đ
        function formatVND(amount) {
            return formatNumber(amount) + " đ";
        }

        // Lấy Query String
        let rawQuery = window.location.search.substring(1);
        let decodedQuery = cleanData(rawQuery);

        if (!decodedQuery) {
            document.body.innerHTML = "<div style='display:flex; align-items:center; justify-content:center; height:100vh; font-weight:bold;'>Dữ liệu hóa đơn trống</div>";
        } else {
            const segments = decodedQuery.split(/[|?]/);
            let ngay = "", khachHang = "", cuocXe = 0, congNo = 0, productsRaw = "";

            segments.forEach(seg => {
                const s = seg.trim();
                if (s.startsWith("ngay=")) ngay = s.replace("ngay=", "");
                else if (s.startsWith("khach_hang=")) khachHang = s.replace("khach_hang=", "");
                else if (s.startsWith("cuoc=")) cuocXe = parseInt(s.replace("cuoc=", "").replace(/\./g, '')) || 0;
                else if (s.startsWith("cong_no=")) congNo = parseInt(s.replace("cong_no=", "").replace(/\./g, '')) || 0;
                else if (s.includes("_a_")) productsRaw = s;
            });

            document.getElementById('ngay-text').innerText = ngay;
            document.getElementById('khach-hang-text').innerText = khachHang;

            // Cập nhật tiêu đề trang và Meta động cho Social Sharing
            if (khachHang) {
                const displayTitle = `Hóa Đơn Hoa - ${khachHang}`;
                document.title = displayTitle;

                // Cố gắng cập nhật Meta Tags (hỗ trợ một số trình duyệt/crawlers hiện đại)
                const metaTitle = document.getElementById('meta-og-title');
                if (metaTitle) metaTitle.setAttribute('content', displayTitle);
            }

            const products = [];
            if (productsRaw) {
                const pList = productsRaw.split('_b_');
                pList.forEach(pStr => {
                    const fields = pStr.trim().split('_a_');
                    if (fields.length >= 3) {
                        const gia = parseInt(fields[1].trim()) || 0;
                        const sl = parseInt(fields[2].trim()) || 0;
                        products.push({
                            stt: products.length + 1,
                            ten: fields[0].trim(),
                            gia: gia,
                            sl: sl,
                            thanhTien: gia * sl
                        });
                    }
                });
            }

            let tongSanPham = products.reduce((sum, p) => sum + p.thanhTien, 0);
            let tongTien = tongSanPham + cuocXe;
            let tongThanhToan = tongTien + congNo;

            const tableBody = document.getElementById('product-table-body');
            tableBody.innerHTML = products.map(p => `
                <tr>
                    <td class="text-center">${p.stt}</td>
                    <td class="font-bold">${p.ten}</td>
                    <td class="text-center">${p.sl}</td>
                    <td class="text-right">${formatNumber(p.gia)}</td>
                    <td class="text-right font-bold">${formatNumber(p.thanhTien)}</td>
                </tr>
            `).join('');

            const summarySection = document.getElementById('summary-section');
            summarySection.innerHTML = `
                <div class="summary-row">
                    <span class="text-gray-600">Tiền hàng:</span>
                    <span class="font-medium">${formatVND(tongSanPham)}</span>
                </div>
                <div class="summary-row">
                    <span class="text-gray-600">Phí vận chuyển:</span>
                    <span class="font-medium">${formatVND(cuocXe)}</span>
                </div>
                <div class="summary-total">
                    <span>TỔNG CỘNG:</span>
                    <span>${formatVND(tongTien)}</span>
                </div>
                <div class="summary-row" style="border-bottom:none; margin-top:1rem;">
                    <span class="text-gray-600">Nợ cũ:</span>
                    <span class="font-medium">${formatVND(congNo)}</span>
                </div>
                <div class="summary-final">
                    <span>Thanh toán:</span>
                    <span>${formatVND(tongThanhToan)}</span>
                </div>
            `;
        }
    </script>
</body>

</html>
